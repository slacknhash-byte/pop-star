<!DOCTYPE html>
<html lang="en">
<head>
   <title>Home Page</title>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>    
   <link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Serif&display=swap" rel="stylesheet">
   <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
   <link rel="stylesheet" type="text/css" href="css/style.css" />
   <script type="text/javascript">
   
   function meetVic() {
		fetch("./intro.json")
			.then((response) => response.json())
			.then((json) => console.log(json));
		showSection("section-01");
		hideSection("section-02");
		hideSection("section-02-header");
   }
   
 
	
	function showSection(section_id) {
		document.getElementById(section_id).style.display = 'block';
	}
	
	function hideSection(section_id) {
		document.getElementById(section_id).style.display = 'none';
	}
   </script>
</head>
<body>
	<header>
	<div class="container">
		<div id="site-branding"><h1><a href="index.html"><img src="img/logo.svg" alt="Phil Smith" width="120" height="40" /></a><span>Phil Smith</span></h1></div>
		<nav> 
		</nav>
	</div>
	</header>
	<main>
	<div class="container">
		<h1>Home Page</h1>
		<article id="game-screen">
		<noscript>This game requires JavaScript to work. Please enable JavaScript if you want to play.</noscript>
		<h2 id="section-01-header">Meet Vic</h2>
		<section id="section-01">
			<div id="section-01-vic-dialogue"></div>
		</section>
		<h2 id="section-02-header">Questionnaire</h2>
		<section id="section-02">
			<div id="question-illustration"></div>
			<p id="question"></p>
			<ul id="answer-group">
				<li id="answer01"></li>
				<li id="answer02"></li>
				<li id="answer03"></li>
				<li id="answer04"></li>
			</ul>
			<div id="vic_replies">
				<img src="" id="vic_illustration" />
				<p id="vic_comment"></p>
			</div>
		</section>
		</article>
	</div>
	<div id="console">
	<p><button onclick="hideSection('section-01')">Hide Section 1</button> <button onclick="showSection('section-01')">Show Section 1</button></p>
	<p><button onclick="hideSection('section-02')">Hide Section 2</button> <button onclick="showSection('section-02')">Show Section 2</button></p>
	<p><button onclick="meetVic()">Meet Vic</button></p>
	</div>
	</main>
	<footer>
	</footer>
</body>
</html>
